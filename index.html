<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domi 知识库</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-card-hover: #273449;
      --border: #334155;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --primary: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* Top bar */
    .topbar { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg); }
    .logo { font-size: 18px; font-weight: 700; color: var(--primary); }
    .logo span { color: var(--text); }
    .search-box { flex: 1; max-width: 400px; }
    .search-box input { width: 100%; padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 14px; outline: none; }
    .search-box input:focus { border-color: var(--primary); }
    .view-toggle { display: flex; gap: 4px; }
    .view-toggle button { padding: 6px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .view-toggle button.active { background: var(--primary); border-color: var(--primary); color: white; }

    /* Tabs */
    .tabs { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
    .tab { padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--text-secondary); cursor: pointer; font-size: 13px; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .tab:hover { border-color: var(--primary); color: var(--text); }
    .tab.active { background: var(--primary); border-color: var(--primary); color: white; }
    .tab .count { background: rgba(255,255,255,0.2); padding: 1px 6px; border-radius: 10px; font-size: 11px; }
    .tab.active .count { background: rgba(255,255,255,0.3); }

    /* Main layout */
    .main { display: flex; height: calc(100vh - 110px); }

    /* Graph view */
    #graph-view { flex: 1; position: relative; overflow: hidden; }
    #graph-svg { width: 100%; height: 100%; display: block; cursor: grab; }
    #graph-svg:active { cursor: grabbing; }

    /* SVG elements */
    .link { stroke: #475569; stroke-opacity: 0.6; stroke-width: 1.5px; }
    .link.faded { stroke-opacity: 0.1; }
    .link.highlighted { stroke: var(--primary); stroke-opacity: 1; stroke-width: 2.5px; }
    .node circle { cursor: pointer; transition: filter 0.2s; }
    .node:hover circle { filter: brightness(1.3); }
    .node.faded circle { opacity: 0.15; }
    .node.faded text { opacity: 0.15; }
    .node text { font-size: 11px; fill: var(--text-secondary); pointer-events: none; text-anchor: middle; }
    .highlight { background: #fbbf24; color: #000; padding: 0 2px; border-radius: 2px; }

    /* Legend */
    .legend { position: absolute; bottom: 20px; left: 20px; background: rgba(15,23,42,0.9); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 12px; }
    .legend-title { color: var(--text-secondary); margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .legend-items { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-item span { color: var(--text-secondary); }

    /* List view */
    #list-view { flex: 1; overflow-y: auto; padding: 16px 24px; display: none; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; }
    .card:hover { background: var(--bg-card-hover); border-color: var(--primary); transform: translateY(-2px); }
    .card.faded { opacity: 0.3; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .card-category { font-size: 11px; padding: 2px 8px; border-radius: 10px; color: white; white-space: nowrap; }
    .card-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .card-source { font-size: 11px; color: var(--text-secondary); }

    /* Detail panel */
    .detail-panel { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: var(--bg-card); border-left: 1px solid var(--border); z-index: 100; transition: right 0.3s ease; overflow-y: auto; }
    .detail-panel.open { bottom: 0; }
    .detail-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 0; }
    .detail-title { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; padding-right: 12px; line-height: 1.4; }
    .detail-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 20px; padding: 4px; border-radius: 6px; }
    .detail-close:hover { background: var(--border); color: var(--text); }
    .detail-body { padding: 16px 20px; }
    .detail-section { margin-bottom: 18px; }
    .detail-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .detail-category { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 10px; color: white; }
    .detail-value { font-size: 13px; color: var(--text); line-height: 1.7; }
    .detail-relations { display: flex; flex-direction: column; gap: 8px; }
    .relation-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.2s; }
    .relation-item:hover { border-color: var(--primary); background: rgba(59,130,246,0.1); }
    .relation-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .relation-type { font-size: 11px; color: var(--text-secondary); }
    .detail-url { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--primary); color: white; border-radius: 8px; text-decoration: none; font-size: 13px; transition: background 0.2s; }
    .detail-url:hover { background: #2563eb; }

    /* Empty state */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text-secondary); gap: 12px; }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* Responsive */
    @media (max-width: 768px) {
      .detail-panel { width: 100%; right: -100%; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
  // State
  let currentTab = '全部';
  let currentView = 'graph';
  let searchQuery = '';
  let simulation = null;

  // Init
  function init() {
    renderTabs();
    renderLegend();
    renderGraph();
  }

  // ========== Tabs ==========
  function renderTabs() {
    const container = document.getElementById('tabs-container');
    const cats = ['全部', ...Object.keys(CATEGORY_CONFIG)];
    const counts = {};
    cats.forEach(c => {
      counts[c] = c === '全部' ? KNOWLEDGE_DATA.nodes.length : KNOWLEDGE_DATA.nodes.filter(n => n.category === c).length;
    });
    container.innerHTML = cats.map(c => {
      const active = c === currentTab ? 'active' : '';
      const emoji = c === '全部' ? '📚' : (CATEGORY_CONFIG[c]?.emoji || '📄');
      return `<button class="tab ${active}" onclick="switchTab('${c}')">${emoji} ${c} <span class="count">${counts[c]}</span></button>`;
    }).join('');
  }

  function switchTab(tab) {
    currentTab = tab;
    renderTabs();
    if (currentView === 'graph') renderGraph();
    else renderList();
  }

  // ========== View toggle ==========
  function switchView(view) {
    currentView = view;
    document.getElementById('btn-graph').classList.toggle('active', view === 'graph');
    document.getElementById('btn-list').classList.toggle('active', view === 'list');
    document.getElementById('graph-view').style.display = view === 'graph' ? 'block' : 'none';
    document.getElementById('list-view').style.display = view === 'list' ? 'block' : 'none';
    if (view === 'graph') { setTimeout(renderGraph, 50); }
    else renderList();
  }

  // ========== Search ==========
  function handleSearch() {
    searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
    if (currentView === 'graph') renderGraph();
    else renderList();
  }

  function highlightText(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<span class="highlight">$1</span>');
  }

  // ========== Filter ==========
  function getFilteredNodes() {
    return KNOWLEDGE_DATA.nodes.filter(n => {
      const matchTab = currentTab === '全部' || n.category === currentTab;
      const matchSearch = !searchQuery ||
        n.label.toLowerCase().includes(searchQuery) ||
        n.summary.toLowerCase().includes(searchQuery);
      return matchTab && matchSearch;
    });
  }

  function getFilteredLinks(nodes) {
    const ids = new Set(nodes.map(n => n.id));
    return KNOWLEDGE_DATA.links.filter(l => {
      const src = typeof l.source === 'object' ? l.source.id : l.source;
      const tgt = typeof l.target === 'object' ? l.target.id : l.target;
      return ids.has(src) && ids.has(tgt);
    });
  }

  // ========== Graph ==========
  function renderGraph() {
    const container = document.getElementById('graph-view');
    const svgEl = document.getElementById('graph-svg');
    const svg = d3.select('#graph-svg');
    svg.selectAll('*').remove();

    const width = Math.max(container.clientWidth || 800, 320);
    const height = container.clientHeight || 600;
    svg.attr('viewBox', `0 0 ${width} ${height}`);

    const nodes = getFilteredNodes();
    const links = getFilteredLinks(nodes);

    if (nodes.length === 0) {
      svg.append('text')
        .attr('x', width / 2).attr('y', height / 2)
        .attr('text-anchor', 'middle').attr('fill', '#94a3b8')
        .attr('font-size', '14px').text('没有找到匹配的知识点');
      return;
    }

    // Deep copy nodes and links for D3 mutation
    const nodesCopy = nodes.map(n => ({ ...n }));
    const linksCopy = links.map(l => ({ ...l }));

    // Zoom
    const zoom = d3.zoom().scaleExtent([0.1, 5])
      .on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);
    svg.on('dblclick.zoom', null);

    const g = svg.append('g');

    // Links
    const link = g.append('g').attr('class', 'links')
      .selectAll('line').data(linksCopy)
      .join('line').attr('class', 'link');

    // Nodes
    const node = g.append('g').attr('class', 'nodes')
      .selectAll('g').data(nodesCopy)
      .join('g').attr('class', 'node')
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    // Node circles
    node.append('circle')
      .attr('r', d => Math.min(8 + (d.connections || 0) * 3, 28))
      .attr('fill', d => getCategoryColor(d.category))
      .attr('stroke', '#0f172a').attr('stroke-width', 2)
      .on('click', (e, d) => { e.stopPropagation(); showDetail(d); });

    // Node labels
    node.append('text')
      .attr('dy', d => Math.min(8 + (d.connections || 0) * 3, 28) + 14)
      .text(d => d.label.length > 14 ? d.label.slice(0, 14) + '…' : d.label);

    // Force simulation
    if (simulation) simulation.stop();
    simulation = d3.forceSimulation(nodesCopy)
      .force('link', d3.forceLink(linksCopy).id(d => d.id).distance(130))
      .force('charge', d3.forceManyBody().strength(-450))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(d => Math.min(8 + (d.connections || 0) * 3, 28) + 15))
      .on('tick', () => {
        link
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });

    // Background click to close
    svg.on('click', () => closeDetail());

    // Search fade
    if (searchQuery) {
      node.each(function(d) {
        const match = d.label.toLowerCase().includes(searchQuery) || d.summary.toLowerCase().includes(searchQuery);
        d3.select(this).classed('faded', !match);
      });
      link.classed('faded', d => {
        const srcMatch = d.source.label?.toLowerCase().includes(searchQuery) || d.source.summary?.toLowerCase().includes(searchQuery);
        const tgtMatch = d.target.label?.toLowerCase().includes(searchQuery) || d.target.summary?.toLowerCase().includes(searchQuery);
        return !srcMatch && !tgtMatch;
      });
    }
  }

  // ========== List ==========
  function renderList() {
    const grid = document.getElementById('card-grid');
    const nodes = getFilteredNodes();
    if (nodes.length === 0) {
      grid.innerHTML = '<div class="empty-state"><p>没有找到匹配的知识点</p></div>';
      return;
    }
    grid.innerHTML = nodes.map(n => {
      const color = getCategoryColor(n.category);
      const emoji = getCategoryEmoji(n.category);
      const hlLabel = highlightText(n.label, searchQuery);
      const hlSummary = highlightText(n.summary, searchQuery);
      return `
        <div class="card" onclick="showDetailFromId('${n.id}')">
          <div class="card-header">
            <div class="card-title">${hlLabel}</div>
            <span class="card-category" style="background:${color}">${emoji}</span>
          </div>
          <div class="card-summary">${hlSummary}</div>
          <div class="card-footer">
            <span class="card-source">${n.source}</span>
            <span style="font-size:11px;color:var(--text-secondary)">${n.connections || 0} 个关联</span>
          </div>
        </div>
      `;
    }).join('');
  }

  // ========== Detail panel ==========
  function showDetail(node) {
    const color = getCategoryColor(node.category);
    const emoji = getCategoryEmoji(node.category);

    // Find related
    const related = [];
    KNOWLEDGE_DATA.links.forEach(l => {
      const srcId = typeof l.source === 'object' ? l.source.id : l.source;
      const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
      if (srcId === node.id) {
        const n = KNOWLEDGE_DATA.nodes.find(x => x.id === tgtId);
        if (n) related.push({ node: n, relation: l.relation });
      }
      if (tgtId === node.id) {
        const n = KNOWLEDGE_DATA.nodes.find(x => x.id === srcId);
        if (n) related.push({ node: n, relation: l.relation });
      }
    });

    document.getElementById('detail-title').textContent = node.label;
    document.getElementById('detail-body').innerHTML = `
      <div class="detail-section">
        <div class="detail-label">分类</div>
        <span class="detail-category" style="background:${color}">${emoji} ${node.category}</span>
      </div>
      <div class="detail-section">
        <div class="detail-label">摘要</div>
        <div class="detail-value">${node.summary}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">来源</div>
        <div class="detail-value">${node.source}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">关联知识 (${related.length})</div>
        ${related.length > 0
          ? `<div class="detail-relations">${related.map(r => `
            <div class="relation-item" onclick="jumpToNode('${r.node.id}')">
              <div class="relation-name">${r.node.label}</div>
              <div class="relation-type">${r.relation}</div>
            </div>`).join('')}</div>`
          : '<div class="detail-value">暂无关联</div>'}
      </div>
      <div class="detail-section">
        <a href="${node.url}" target="_blank" class="detail-url">🔗 查看归档原文</a>
      </div>
    `;
    document.getElementById('detail-panel').classList.add('open');
    highlightGraphNodes(node.id);
  }

  function showDetailFromId(id) {
    const node = KNOWLEDGE_DATA.nodes.find(n => n.id === id);
    if (node) showDetail(node);
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    clearGraphHighlight();
  }

  function jumpToNode(nodeId) {
    const node = KNOWLEDGE_DATA.nodes.find(n => n.id === nodeId);
    if (!node) return;
    switchTab(node.category);
    if (currentView !== 'graph') switchView('graph');
    setTimeout(() => {
      showDetail(node);
    }, 300);
  }

  function highlightGraphNodes(nodeId) {
    if (currentView !== 'graph') return;
    const svg = d3.select('#graph-svg');
    const relatedIds = new Set([nodeId]);
    KNOWLEDGE_DATA.links.forEach(l => {
      const srcId = typeof l.source === 'object' ? l.source.id : l.source;
      const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
      if (srcId === nodeId) relatedIds.add(tgtId);
      if (tgtId === nodeId) relatedIds.add(srcId);
    });
    svg.selectAll('.node').classed('faded', d => !relatedIds.has(d.id));
    svg.selectAll('.link').classed('faded', d => {
      const srcId = typeof d.source === 'object' ? d.source.id : d.source;
      const tgtId = typeof d.target === 'object' ? d.target.id : d.target;
      return srcId !== nodeId && tgtId !== nodeId;
    });
  }

  function clearGraphHighlight() {
    if (currentView !== 'graph') return;
    const svg = d3.select('#graph-svg');
    svg.selectAll('.node').classed('faded', false);
    svg.selectAll('.link').classed('faded', false);
  }

  // ========== Legend ==========
  function renderLegend() {
    const el = document.getElementById('graph-legend');
    el.innerHTML = `
      <div class="legend-title">图例</div>
      <div class="legend-items">
        ${Object.entries(CATEGORY_CONFIG).map(([cat, cfg]) => `
          <div class="legend-item">
            <div class="legend-dot" style="background:${cfg.color}"></div>
            <span>${cfg.emoji} ${cat}</span>
          </div>`).join('')}
      </div>
    `;
  }

  // ========== Resize ==========
  window.addEventListener('resize', () => {
    if (currentView === 'graph') renderGraph();
  });

  // ========== Start ==========
  init();
</script>
