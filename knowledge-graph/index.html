<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domi 知识库</title>
  <style>
    :root { --bg: #0f172a; --bg-card: #1e293b; --border: #334155; --text: #f1f5f9; --text-secondary: #94a3b8; --primary: #3b82f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .topbar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .logo { font-size: 16px; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .logo span { color: var(--text); }
    .search-box { flex: 1; }
    .search-box input { width: 100%; max-width: 320px; padding: 7px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 13px; outline: none; }
    .search-box input:focus { border-color: var(--primary); }
    .view-toggle { display: flex; gap: 4px; }
    .view-toggle button { padding: 5px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; color: var(--text-secondary); cursor: pointer; font-size: 12px; }
    .view-toggle button.active { background: var(--primary); border-color: var(--primary); color: white; }
    .tabs { display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
    .tab { padding: 5px 12px; background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--text-secondary); cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .tab:hover { border-color: var(--primary); color: var(--text); }
    .tab.active { background: var(--primary); border-color: var(--primary); color: white; }
    .tab .count { font-size: 10px; opacity: 0.7; }
    .main { display: flex; height: calc(100vh - 96px); overflow: hidden; }
    #graph-view { flex: 1; position: relative; overflow: hidden; }
    #graph-svg { width: 100%; height: 100%; display: block; cursor: grab; }
    #graph-svg:active { cursor: grabbing; }
    .graph-link { stroke: #475569; stroke-opacity: 0.5; stroke-width: 1.5px; }
    .graph-link.faded { stroke-opacity: 0.08; }
    .graph-node circle { cursor: pointer; }
    .graph-node text { font-size: 11px; fill: var(--text-secondary); pointer-events: none; text-anchor: middle; dominant-baseline: middle; }
    .graph-node.faded circle { opacity: 0.12; }
    .graph-node.faded text { opacity: 0.12; }
    .highlight { background: #fbbf24; color: #000; padding: 0 2px; border-radius: 2px; }
    .legend { position: absolute; bottom: 16px; left: 16px; background: rgba(15,23,42,0.85); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 12px; backdrop-filter: blur(8px); }
    .legend-title { color: var(--text-secondary); margin-bottom: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 8px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-item span { color: var(--text-secondary); font-size: 11px; }
    #list-view { flex: 1; overflow-y: auto; padding: 12px 16px; display: none; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.2s; }
    .card:hover { background: #273449; border-color: var(--primary); transform: translateY(-1px); }
    .card.faded { opacity: 0.25; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .card-category { font-size: 10px; padding: 2px 7px; border-radius: 10px; color: white; white-space: nowrap; flex-shrink: 0; }
    .card-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin: 6px 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .card-source { font-size: 10px; color: var(--text-secondary); }
    .detail-panel { position: fixed; top: 0; right: -380px; width: 370px; height: 100vh; background: var(--bg-card); border-left: 1px solid var(--border); z-index: 200; transition: right 0.3s ease; overflow-y: auto; display: flex; flex-direction: column; }
    .detail-panel.open { right: 0; }
    .detail-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-card); z-index: 1; }
    .detail-title { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; padding-right: 10px; line-height: 1.4; }
    .detail-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 6px; }
    .detail-close:hover { background: var(--border); color: var(--text); }
    .detail-body { padding: 14px; flex: 1; }
    .detail-section { margin-bottom: 14px; }
    .detail-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-category { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; color: white; }
    .detail-value { font-size: 12px; color: var(--text); line-height: 1.7; }
    .detail-relations { display: flex; flex-direction: column; gap: 6px; }
    .relation-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; transition: all 0.2s; }
    .relation-item:hover { border-color: var(--primary); }
    .relation-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .relation-type { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
    .detail-url { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; background: var(--primary); color: white; border-radius: 8px; text-decoration: none; font-size: 12px; }
    .detail-url:hover { background: #2563eb; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; color: var(--text-secondary); gap: 10px; }
    .empty-state p { font-size: 13px; }
    @media (max-width: 600px) {
      .detail-panel { width: 100%; right: auto; left: 0; top: auto; bottom: -100%; height: 80vh; border-left: none; border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; }
      .detail-panel.open { bottom: 0; right: auto; }
      .card-grid { grid-template-columns: 1fr; }
      .main { height: calc(100vh - 88px); }
    }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo">Domi<span> 知识库</span></div>
  <div class="search-box"><input type="text" id="search-input" placeholder="搜索知识点..." oninput="onSearch()"></div>
  <div class="view-toggle">
    <button id="btn-graph" class="active" onclick="setView('graph')">图谱</button>
    <button id="btn-list" onclick="setView('list')">列表</button>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="main">
  <div id="graph-view"><svg id="graph-svg"></svg><div class="legend" id="legend"></div></div>
  <div id="list-view"><div class="card-grid" id="cards"></div></div>
</div>
<div class="detail-panel" id="detail">
  <div class="detail-header">
    <div class="detail-title" id="detail-title"></div>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const D=KNOWLEDGE_DATA;
const CC={"朗新科技":{"color":"#3B82F6","emoji":"🏢"},"可信数据空间":{"color":"#10B981","emoji":"🔐"},"充电桩":{"color":"#F97316","emoji":"⚡"},"虚拟电厂":{"color":"#EF4444","emoji":"⚡"},"数据基础设施":{"color":"#8B5CF6","emoji":"🏛️"}};
let ct='全部',cv='graph',sq='',sim=null;

let SUMMARIES={},summariesLoaded=false;
function loadSummaries(cb){
  if(summariesLoaded){cb();return;}
  var s=document.createElement('script');
  s.src='summaries.js';
  s.onload=function(){summariesLoaded=true;cb();};
  s.onerror=function(){cb();};
  document.head.appendChild(s);
}
function init(){
  renderTabs();renderLegend();renderGraph();
}
function renderTabs(){
  const cats=['全部',...Object.keys(CC)];
  const cnt={};
  cats.forEach(c=>cnt[c]=c==='全部'?D.nodes.length:D.nodes.filter(n=>n.category===c).length);
  document.getElementById('tabs').innerHTML=cats.map(c=>`<button class="tab ${c===ct?'active':''}" onclick="setTab('${c}')">${c==='全部'?'📚':CC[c].emoji} ${c} <span class="count">${cnt[c]}</span></button>`).join('');
}
function setTab(t){ct=t;showLoading(false);renderTabs();cv==='graph'?renderGraph():renderList();}
function setView(v){
  cv=v;
  document.getElementById('btn-graph').classList.toggle('active',v==='graph');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  document.getElementById('graph-view').style.display=v==='graph'?'block':'none';
  document.getElementById('list-view').style.display=v==='list'?'block':'none';
  if(v==='graph')setTimeout(renderGraph,50);else renderList();
}
function onSearch(){sq=document.getElementById('search-input').value.trim().toLowerCase();cv==='graph'?renderGraph():renderList();}
function hl(txt,q){if(!q)return txt;return txt.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class=highlight>$1</span>');}
function fn(){return D.nodes.filter(n=>{const okT=ct==='全部'||n.category===ct;const okQ=!sq||n.label.toLowerCase().includes(sq);return okT&&okQ;});}
function fl(nodes){const ids=new Set(nodes.map(n=>n.id));return D.links.filter(l=>{const s=typeof l.source==='object'?l.source.id:l.source;const t=typeof l.target==='object'?l.target.id:l.target;return ids.has(s)&&ids.has(t);});}
function showLoading(show){
  const existing=document.getElementById('graph-loading');
  if(show&&!existing){
    const div=document.createElement('div');
    div.id='graph-loading';
    div.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,23,42,.85);color:#fff;padding:16px 32px;border-radius:8px;font-size:14px;z-index:9999;';
    div.textContent='正在布局知识点…';
    document.body.appendChild(div);
  } else if(!show&&existing){
    existing.remove();
  }
}
let settling=false;
function renderGraph(){showLoading(true);
  if(settling){return;}
  const svg=d3.select('#graph-svg');
  const W=document.getElementById('graph-view').clientWidth||800;
  const H=document.getElementById('graph-view').clientHeight||600;
  const nodes=fn(),links=fl(nodes);
  if(!nodes.length){svg.selectAll('*').remove();svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('fill','#94a3b8').attr('font-size',14).text('没有找到匹配的知识点');return;}
  const nc=nodes.slice(0,80).map(n=>({...n})),lc=links.map(l=>({...l}));
  nc.forEach(n=>{n.x=W/2+(Math.random()-.5)*W*.8;n.y=H/2+(Math.random()-.5)*H*.8;});
  if(nodes.length>50){svg.append("text").attr("x",W/2).attr("y",H-20).attr("text-anchor","middle").attr("fill","#94a3b8").attr("font-size",12).text(`显示前50个节点（共${nodes.length}个），请使用列表视图查看全部`);}
  svg.selectAll('*').remove();
  settling=true;svg.attr('viewBox',`0 0 ${W} ${H}`);
  const zoom=d3.zoom().scaleExtent([.1,5]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);svg.on('dblclick.zoom',null);
  const g=svg.append('g');
  const link=g.append('g').selectAll('line').data(lc).join('line').attr('class','graph-link');
  const node=g.append('g').selectAll('g').data(nc).join('g').attr('class','graph-node').call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  node.append('circle').attr('r',d=>Math.min(8+(d.connections||0)*2.5,26)).attr('fill',d=>CC[d.category]?.color||'#6B7280').attr('stroke','#0f172a').attr('stroke-width',2).on('click',(e,d)=>{e.stopPropagation();showDetail(d);});
  node.append('text').attr('dy',d=>Math.min(8+(d.connections||0)*2.5,26)+14).text(d=>d.label.length>13?d.label.slice(0,13)+'…':d.label);
  if(sim)sim.stop();
  sim=d3.forceSimulation(nc).alphaDecay(.08).velocityDecay(.4).force('link',d3.forceLink(lc).id(d=>d.id).distance(80)).force('charge',d3.forceManyBody().strength(-120)).force('center',d3.forceCenter(W/2,H/2)).force('collision',d3.forceCollide().radius(d=>Math.min(8+(d.connections||0)*2.5,26)+8)).on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`);}).on('end',()=>{settling=false;showLoading(false);});
  setTimeout(()=>{if(settling){sim.stop();settling=false;showLoading(false);}},3000);
  if(sq){node.classed('faded',d=>!d.label.toLowerCase().includes(sq)&&!d.summary.toLowerCase().includes(sq));link.classed('faded',d=>{const sm=d.source.label?.toLowerCase().includes(sq)||d.source.summary?.toLowerCase().includes(sq);const tm=d.target.label?.toLowerCase().includes(sq)||d.target.summary?.toLowerCase().includes(sq);return!sm&&!tm;});}
  svg.on('click',()=>closeDetail());
  if(!nodes.length)g.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('fill','#94a3b8').attr('font-size',14).text('没有找到匹配的知识点');
}
function renderList(){
  const grid=document.getElementById('cards');
  const nodes=fn();
  if(!nodes.length){grid.innerHTML='<div class=empty-state><p>没有找到匹配的知识点</p></div>';return;}
  grid.innerHTML=nodes.map(n=>`<div class=card onclick=showDetailById('${n.id}')><div class=card-header><div class=card-title>${hl(n.label,sq)}</div><span class=card-category style=background:${CC[n.category]?.color}>${CC[n.category]?.emoji}</span></div><div class=card-summary>${hl(n.summary||SUMMARIES[n.id]||"",sq)}</div><div class=card-footer><span class=card-source>${n.date?n.date+" · ":"}${n.source}</span><span style=font-size:10px;color:var(--text-secondary)>${n.connections}个关联</span></div></div>`).join('');
}
function showDetail(n){
  const color=CC[n.category]?.color||'#6B7280',emoji=CC[n.category]?.emoji||'📄';
  const related=[];
  D.links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source;const t=typeof l.target==='object'?l.target.id:l.target;if(s===n.id){const x=D.nodes.find(m=>m.id===t);if(x)related.push({node:x,rel:l.relation});}if(t===n.id){const x=D.nodes.find(m=>m.id===s);if(x)related.push({node:x,rel:l.relation});}});
  const summary=n.summary||(SUMMARIES[n.id]||'（点击"查看归档原文"阅读完整摘要）');
  document.getElementById('detail-title').textContent=n.label;
  document.getElementById('detail-body').innerHTML=`<div class=detail-section><div class=detail-label>分类</div><span class=detail-category style=background:${color}>${emoji} ${n.category}</span></div><div class=detail-section><div class=detail-label>摘要</div><div class=detail-value id=detail-summary>${summary}</div></div><div class=detail-section><div class=detail-label>来源</div><div class=detail-value>${n.source}</div></div><div class=detail-section><div class=detail-label>关联知识 (${related.length})</div>${related.length?`<div class=detail-relations>${related.map(r=>`<div class=relation-item onclick=jumpTo('${r.node.id}')><div class=relation-name>${r.node.label}</div><div class=relation-type>${r.rel}</div></div>`).join('')}</div>`:'<div class=detail-value>暂无关联</div>'}</div><div class=detail-section><a href=${n.url} target=_blank class=detail-url>🔗 查看归档原文</a></div>`;
  if(!n.summary&&SUMMARIES[n.id]){
    document.getElementById('detail-summary').textContent=SUMMARIES[n.id];
  } else if(!n.summary&&!SUMMARIES[n.id]){
    loadSummaries(function(){
      if(SUMMARIES[n.id]){
        var el=document.getElementById('detail-summary');
        if(el)el.textContent=SUMMARIES[n.id];
      }
    });
  }
  document.getElementById('detail').classList.add('open');
  hlG(n.id);
}
function showDetailById(id){const n=D.nodes.find(m=>m.id===id);if(n)showDetail(n);}
function closeDetail(){document.getElementById('detail').classList.remove('open');clG();}
function jumpTo(id){const n=D.nodes.find(m=>m.id===id);if(!n)return;setTab(n.category);if(cv!=='graph')setView('graph');setTimeout(()=>showDetail(n),300);}
function hlG(id){if(cv!=='graph')return;const svg=d3.select('#graph-svg');const rid=new Set([id]);D.links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source;const t=typeof l.target==='object'?l.target.id:l.target;if(s===id)rid.add(t);if(t===id)rid.add(s);});svg.selectAll('.graph-node').classed('faded',d=>!rid.has(d.id));svg.selectAll('.graph-link').classed('faded',d=>{const s=typeof d.source==='object'?d.source.id:d.source;const t=typeof d.target==='object'?d.target.id:d.target;return s!==id&&t!==id;});}
function clG(){if(cv!=='graph')return;const svg=d3.select('#graph-svg');svg.selectAll('.graph-node').classed('faded',false);svg.selectAll('.graph-link').classed('faded',false);}
function renderLegend(){document.getElementById('legend').innerHTML=`<div class=legend-title>图例</div><div class=legend-items>${Object.entries(CC).map(([c,cfg])=>`<div class=legend-item><div class=legend-dot style=background:${cfg.color}></div><span>${cfg.emoji} ${c}</span></div>`).join('')}</div>`;}
window.addEventListener('resize',()=>{if(cv==='graph')renderGraph();});
init();
</script>
</script>

<script>
(function(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','data.js?t='+Date.now(),true);
  xhr.onload=function(){
    if(xhr.status===200){
      eval(xhr.responseText);
      if(typeof KNOWLEDGE_DATA!=='undefined'){
        D=KNOWLEDGE_DATA;
        if(typeof CATEGORY_CONFIG!=='undefined'){
          Object.keys(CATEGORY_CONFIG).forEach(function(k){CC[k]=CATEGORY_CONFIG[k];});
        }
        init();
      }
    }
  };
  xhr.onerror=function(){init();};
  xhr.send();
})();
</script>

</body>
</html>
